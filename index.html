<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yüzdelik Hesaplama Makinesi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: black;
            color: yellow;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            margin: 0;
        }
        h2 { color: yellow; margin-bottom: 80px; }
        
        /* GİRİŞ KUTUSUNU BURADAN BÜYÜTTÜM */
        .fiyat-input {
            width: 89%;
            height: 89px; /* Kutunun yüksekliği */
            font-size: 40px; /* Yazı büyüklüğü */
            text-align: center;
            border-radius: 95px;
            border: 4px solid yellow;
            background-color: #f00;
            color: white;
            margin-bottom: 10px;
            outline: none;
        }

        .sonuc-kutusu {
            width: 85%;
            background-color: green;
            padding: 10px;
            border-radius: 39px;
            border: 5px solid red;
        }

        .oran-satiri {
            display: flex;
            justify-content: space-between;
            font-size: 20px; /* Oran yazılarının büyüklüğü */
            padding: 2
            15px 0;
            border-bottom: 10px solid red;
        }

        .oran-satiri:last-child { border-bottom: none; }
        .yuzde { color: white; }
        .fiyat { color: white; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Aşağıya Fiyatı Giriniz
             ↓</h2>
    
    <input type="number" id="ihaleFiyati" class="fiyat-input" placeholder="0.00" oninput="hesapla()">

    <div class="sonuc-kutusu">
        <div class="oran-satiri"><span class="yuzde">%85 Teklif:</span> <span id="r85" class="fiyat">-</span></div>
        <div class="oran-satiri"><span class="yuzde">%84 Teklif:</span> <span id="r84" class="fiyat">-</span></div>
        <div class="oran-satiri"><span class="yuzde">%70 Teklif:</span> <span id="r70" class="fiyat">-</span></div>
        <div class="oran-satiri"><span class="yuzde">%55 Teklif:</span> <span id="r55" class="fiyat">-</span></div>
        <div class="oran-satiri"><span class="yuzde">%40 Teklif:</span> <span id="r40" class="fiyat">-</span></div>
        <div class="oran-satiri"><span class="yuzde">%30 Teklif:</span> <span id="r30" class="fiyat">-</span></div>
        <div class="oran-satiri"><span class="yuzde">%20 Teklif:</span> <span id="r20" class="fiyat">-</span></div>
    </div>

    <script>
        function hesapla() {
            let fiyat = document.getElementById("ihaleFiyati").value;
            if (fiyat > 0) {
                document.getElementById("r85").innerText = (fiyat * 0.85).toFixed(2) + " TL";
                document.getElementById("r84").innerText = (fiyat * 0.84).toFixed(2) + " TL";
                document.getElementById("r70").innerText = (fiyat * 0.70).toFixed(2) + " TL";
                document.getElementById("r55").innerText = (fiyat * 0.55).toFixed(2) + " TL";
                document.getElementById("r40").innerText = (fiyat * 0.40).toFixed(2) + " TL";
                document.getElementById("r30").innerText = (fiyat * 0.30).toFixed(2) + " TL";
                document.getElementById("r20").innerText = (fiyat * 0.20).toFixed(2) + " TL";
            } else {
                let fiyatlar = ["r85","r84", "r70", "r55", "r40", "r30", "r20"];
                fiyatlar.forEach(id => document.getElementById(id).innerText = "-");
            }
        }
    </script>

</body>
</html>
